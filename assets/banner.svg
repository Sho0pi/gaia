<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" role="img" aria-label="Gaia - your everyday AI agent that forges its own specialists and never forgets">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B1B19"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#0E7490" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#0E7490" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0E7490" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#2B5C44"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow)"/>

  <!-- Greek-key meander, top (classical motif, low-key) -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.28" stroke-linecap="square">
    <path transform="translate(444 40)" d="M0 0h28v28h-18v-18h8v8M48 0h28v28h-18v-18h8v8M96 0h28v28h-18v-18h8v8M144 0h28v28h-18v-18h8v8M192 0h28v28h-18v-18h8v8M240 0h28v28h-18v-18h8v8M288 0h28v28h-18v-18h8v8"/>
  </g>

  <!-- logo mark (the gaia icon: gradient disc + Γ) -->
  <circle cx="640" cy="120" r="40" fill="url(#mark)"/>
  <circle cx="640" cy="120" r="40" fill="none" stroke="#5EEAD4" stroke-width="1.5" opacity="0.5"/>
  <text x="640" y="134" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="900" fill="#F8FAFC">Γ</text>

  <!-- wordmark -->
  <text x="640" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="116" font-weight="700" fill="#F8FAFC" letter-spacing="2">Γαῖα</text>

  <!-- accent underline with classical end-caps -->
  <g>
    <rect x="478" y="292" width="324" height="4" rx="2" fill="url(#accent)"/>
    <rect x="472" y="286" width="10" height="16" rx="1" fill="url(#accent)"/>
    <rect x="798" y="286" width="10" height="16" rx="1" fill="url(#accent)"/>
  </g>

  <!-- slogan: everyday / general-purpose, then the differentiators -->
  <text x="640" y="334" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="600" fill="#E2E8F0" letter-spacing="1">your everyday AI agent</text>
  <text x="640" y="372" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="600" fill="#5EEAD4" letter-spacing="5">· FORGES ITS OWN SPECIALISTS · NEVER FORGETS ·</text>
</svg>
