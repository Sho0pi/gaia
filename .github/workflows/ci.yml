name: CI
on:
  push:
  pull_request:
  workflow_dispatch: # also unlocks the on-demand live `system` job below

jobs:
  # Required: the full offline tier — lint, types, and every test that needs no
  # external resource (the system marker gates keys/native libs/network).
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run pytest -m "not system" --cov=src/gaia

  # On-demand: the live tier (model key, native libs). Run manually from the Actions
  # tab when GEMINI_API_KEY is configured as a repo secret — instead of these tests
  # silently skipping forever.
  system:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run pytest -m system
