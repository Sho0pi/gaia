name: Feature
description: New capability for godpy
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What and why.
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: Prior art + the proven library to reuse (run lib-researcher first).
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test plan
      description: Unit + system tests.
